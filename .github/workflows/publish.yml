name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify tag version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(./gradlew properties --no-daemon --console=plain -q | awk '/^version:/ { print $2; exit }')"
          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - name: Stage Maven artifacts
        run: ./gradlew publishMavenPublicationToStagingRepository --no-daemon

      - name: Prepare JReleaser signing keys
        run: |
          install -m 700 -d "$RUNNER_TEMP/jreleaser-gpg"
          printf '%s' "$JRELEASER_GPG_PUBLIC_KEY_B64" | base64 --decode --ignore-garbage > "$RUNNER_TEMP/jreleaser-gpg/public.asc"
          printf '%s' "$JRELEASER_GPG_SECRET_KEY_B64" | base64 --decode --ignore-garbage > "$RUNNER_TEMP/jreleaser-gpg/secret.asc"
          grep -q "BEGIN PGP PUBLIC KEY BLOCK" "$RUNNER_TEMP/jreleaser-gpg/public.asc"
          grep -q "BEGIN PGP PRIVATE KEY BLOCK" "$RUNNER_TEMP/jreleaser-gpg/secret.asc"
          chmod 600 "$RUNNER_TEMP/jreleaser-gpg/"*.asc
        env:
          JRELEASER_GPG_PUBLIC_KEY_B64: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY_B64 }}
          JRELEASER_GPG_SECRET_KEY_B64: ${{ secrets.JRELEASER_GPG_SECRET_KEY_B64 }}

      - name: Publish to Maven Central
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_GITHUB_TOKEN: ${{ github.token }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ runner.temp }}/jreleaser-gpg/public.asc
          JRELEASER_GPG_SECRET_KEY: ${{ runner.temp }}/jreleaser-gpg/secret.asc
        with:
          arguments: deploy

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
